<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Deka Mile Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      padding-top: env(safe-area-inset-top, 16px);
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
      /* leave space for sticky total bar + home indicator */
      padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px));
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 16px 0;
    }

    /* ── Header ── */
    .header { margin-bottom: 14px; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #6c6c70; margin-top: 2px; }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .metric { background: #fff; border-radius: 12px; padding: 10px 10px 11px; }
    .metric-label { font-size: 10px; color: #6c6c70; margin-bottom: 3px; line-height: 1.2; }
    .metric-value { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }

    /* ── Chart ── */
    .legend { display: flex; gap: 14px; font-size: 12px; color: #6c6c70; margin-bottom: 6px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .chart-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 12px 10px 10px;
      margin-bottom: 12px;
      height: 260px;
      position: relative;
    }
    .chart-wrap canvas { width: 100% !important; height: 100% !important; }

    /* ── Lock panel ── */
    .lock-panel {
      background: #fff;
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 12px;
    }
    .lock-row-1 { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 15px; font-weight: 500; }

    /* iOS-style toggle */
    .toggle { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #e5e5ea;
      border-radius: 15.5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #34c759; }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 27px; height: 27px;
      left: 2px; top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    .lock-row-2 {
      display: flex; align-items: center; gap: 10px;
      margin-top: 12px;
      opacity: 0.35; pointer-events: none;
      transition: opacity 0.2s;
      flex-wrap: wrap;
    }
    .lock-row-2.active { opacity: 1; pointer-events: auto; }
    .lock-row-2 label { font-size: 13px; color: #6c6c70; white-space: nowrap; }
    .lock-row-2 input[type=number] {
      width: 72px;
      padding: 7px 10px;
      border: 1.5px solid #d1d1d6;
      border-radius: 8px;
      font-size: 17px; font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #1c1c1e; text-align: center;
      outline: none;
      -webkit-appearance: none;
      background: #f2f2f7;
    }
    .lock-row-2 input[type=number]:focus { border-color: #007aff; background: #fff; }
    .lock-row-2 input[type=number]::-webkit-inner-spin-button,
    .lock-row-2 input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .lock-hint { font-size: 12px; color: #6c6c70; }

    /* ── Segment list ── */
    .seg-list { background: #fff; border-radius: 12px; padding: 0 14px; margin-bottom: 12px; }

    .seg-row { padding: 11px 0; border-bottom: 1px solid #f2f2f7; }
    .seg-row:last-child { border-bottom: none; }

    .seg-top {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .seg-left { display: flex; align-items: center; gap: 7px; }

    .tag {
      display: inline-block; font-size: 10px;
      padding: 2px 7px; border-radius: 5px;
      font-weight: 700; letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .tag-run  { background: #e0f0ff; color: #0071e3; }
    .tag-zone { background: #e6f4d7; color: #248a00; }

    .seg-name { font-size: 14px; font-weight: 600; }
    .seg-sub  { font-size: 12px; color: #6c6c70; margin-bottom: 4px; }

    .seg-time {
      font-size: 19px; font-weight: 700;
      font-variant-numeric: tabular-nums; letter-spacing: -0.3px;
      color: #1c1c1e; min-width: 44px; text-align: right;
    }

    /* Slider — big touch target for thumbs */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 28px;
      background: transparent; cursor: pointer; margin: 0;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 5px; border-radius: 3px; background: #e5e5ea;
    }
    input[type=range].run-slider::-webkit-slider-runnable-track  { background: #cce4ff; }
    input[type=range].zone-slider::-webkit-slider-runnable-track { background: #d4edba; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px; border-radius: 50%;
      background: #fff; border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      margin-top: -10.5px;
    }
    input[type=range]:disabled::-webkit-slider-thumb  { background: #d1d1d6; box-shadow: none; }
    input[type=range]:disabled::-webkit-slider-runnable-track { background: #e5e5ea; }

    /* ── Sticky total bar ── */
    .total-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1c1c1e; color: #fff;
      padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100;
    }
    .total-label { font-size: 11px; color: #8e8e93; margin-bottom: 2px; }
    .total-time {
      font-size: 30px; font-weight: 700;
      font-variant-numeric: tabular-nums; letter-spacing: -0.5px; line-height: 1;
    }
    .pace-badge {
      display: inline-block; padding: 5px 12px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    .badge-elite       { background: #248a00; color: #fff; }
    .badge-competitive { background: #0071e3; color: #fff; }
    .badge-open        { background: #f59e0b; color: #fff; }
    .badge-finisher    { background: #6c6c70; color: #fff; }

    .footer { text-align: center; font-size: 11px; color: #aeaeb2; padding: 6px 0 4px; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🏃 Deka Mile Tracker</h1>
    <p class="subtitle">Adjust sliders to plan or record your splits.</p>
  </div>

  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Run time</div><div class="metric-value" id="s-run">—</div></div>
    <div class="metric"><div class="metric-label">Zone time</div><div class="metric-value" id="s-zone">—</div></div>
    <div class="metric"><div class="metric-label">Avg / seg</div><div class="metric-value" id="s-avg">—</div></div>
  </div>

  <div class="legend">
    <span><span class="legend-sq" style="background:#378ADD"></span>Run</span>
    <span><span class="legend-sq" style="background:#639922"></span>Zone</span>
  </div>
  <div class="chart-wrap"><canvas id="splitChart"></canvas></div>

  <div class="lock-panel">
    <div class="lock-row-1">
      <span class="toggle-label">Lock all runs to same time</span>
      <label class="toggle">
        <input type="checkbox" id="lock-toggle" onchange="onLockToggle()">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="lock-row-2" id="lock-input-wrap">
      <label for="lock-val">Seconds per run:</label>
      <input type="number" id="lock-val" min="15" max="180" value="55"
             inputmode="numeric" pattern="[0-9]*" oninput="onLockValueChange()">
      <span class="lock-hint" id="lock-hint"></span>
    </div>
  </div>

  <div class="seg-list" id="seg-list"></div>

  <div class="footer">Deka Mile · 10 zones + 10 × 160m runs · Spartan DEKA</div>
</div>

<div class="total-bar">
  <div>
    <div class="total-label">Total race time</div>
    <div class="total-time" id="total-time">00:00:00</div>
  </div>
  <div style="text-align:right">
    <div class="total-label">Tier</div>
    <div id="pace-badge" class="pace-badge badge-open">💪 Solid open</div>
  </div>
</div>

<script>
const segments = [
  { label: 'Run 1',   sub: '160m run',                       type: 'run',  def: 50  },
  { label: 'Zone 1',  sub: 'RAM reverse lunges — 30 reps',   type: 'zone', def: 75  },
  { label: 'Run 2',   sub: '160m run',                       type: 'run',  def: 52  },
  { label: 'Zone 2',  sub: '500m row erg',                   type: 'zone', def: 105 },
  { label: 'Run 3',   sub: '160m run',                       type: 'run',  def: 54  },
  { label: 'Zone 3',  sub: 'Box jump/step overs — 20 reps',  type: 'zone', def: 55  },
  { label: 'Run 4',   sub: '160m run',                       type: 'run',  def: 55  },
  { label: 'Zone 4',  sub: 'Med ball sit-ups — 25 reps',     type: 'zone', def: 60  },
  { label: 'Run 5',   sub: '160m run',                       type: 'run',  def: 56  },
  { label: 'Zone 5',  sub: '500m SkiErg',                    type: 'zone', def: 115 },
  { label: 'Run 6',   sub: '160m run',                       type: 'run',  def: 58  },
  { label: 'Zone 6',  sub: 'Farmers carry — 100m',           type: 'zone', def: 65  },
  { label: 'Run 7',   sub: '160m run',                       type: 'run',  def: 60  },
  { label: 'Zone 7',  sub: 'Air bike — 25 calories',         type: 'zone', def: 75  },
  { label: 'Run 8',   sub: '160m run',                       type: 'run',  def: 62  },
  { label: 'Zone 8',  sub: 'Dead ball shoulder overs — 20',  type: 'zone', def: 70  },
  { label: 'Run 9',   sub: '160m run',                       type: 'run',  def: 64  },
  { label: 'Zone 9',  sub: 'Tank push/pull — 100m',          type: 'zone', def: 90  },
  { label: 'Run 10',  sub: '160m run',                       type: 'run',  def: 66  },
  { label: 'Zone 10', sub: 'RAM burpees — 20 reps',          type: 'zone', def: 80  },
];

const times = segments.map(s => s.def);

function fmtSec(s) {
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}
function fmtTotal(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function update(idx) {
  times[idx] = parseInt(document.getElementById('sl-'+idx).value);
  document.getElementById('tv-'+idx).textContent = fmtSec(times[idx]);
  recalc();
}

function onLockToggle() {
  const locked = document.getElementById('lock-toggle').checked;
  document.getElementById('lock-input-wrap').classList.toggle('active', locked);
  segments.forEach((seg, i) => {
    if (seg.type === 'run') {
      const sl = document.getElementById('sl-'+i);
      if (sl) sl.disabled = locked;
    }
  });
  if (locked) applyLockValue();
  updateLockHint();
}

function onLockValueChange() {
  if (document.getElementById('lock-toggle').checked) applyLockValue();
  updateLockHint();
}

function applyLockValue() {
  let val = parseInt(document.getElementById('lock-val').value);
  if (isNaN(val)) return;
  val = Math.max(15, Math.min(180, val));
  segments.forEach((seg, i) => {
    if (seg.type === 'run') {
      times[i] = val;
      const sl = document.getElementById('sl-'+i);
      const tv = document.getElementById('tv-'+i);
      if (sl) sl.value = val;
      if (tv) tv.textContent = fmtSec(val);
    }
  });
  recalc();
}

function updateLockHint() {
  const locked = document.getElementById('lock-toggle').checked;
  const hint   = document.getElementById('lock-hint');
  if (locked) {
    const val = parseInt(document.getElementById('lock-val').value) || 0;
    hint.textContent = '= ' + fmtSec(val * 10) + ' run total';
  } else {
    hint.textContent = '';
  }
}

function recalc() {
  const total     = times.reduce((a,b)=>a+b,0);
  const runTotal  = times.filter((_,i)=>segments[i].type==='run').reduce((a,b)=>a+b,0);
  const zoneTotal = times.filter((_,i)=>segments[i].type==='zone').reduce((a,b)=>a+b,0);

  document.getElementById('total-time').textContent = fmtTotal(total);
  document.getElementById('s-run').textContent  = fmtSec(runTotal);
  document.getElementById('s-zone').textContent = fmtSec(zoneTotal);
  document.getElementById('s-avg').textContent  = fmtSec(Math.round(total/20));

  const m = total/60;
  const badge = document.getElementById('pace-badge');
  if      (m<=22) { badge.textContent='⚡ Elite';       badge.className='pace-badge badge-elite'; }
  else if (m<=27) { badge.textContent='🔥 Competitive'; badge.className='pace-badge badge-competitive'; }
  else if (m<=35) { badge.textContent='💪 Solid open';  badge.className='pace-badge badge-open'; }
  else            { badge.textContent='🏅 Finisher';    badge.className='pace-badge badge-finisher'; }

  if (chartInst) { chartInst.data.datasets[0].data=[...times]; chartInst.update('none'); }
}

// Build segment rows
const list = document.getElementById('seg-list');
segments.forEach((seg, i) => {
  const zoneNum = seg.type==='zone' ? Math.ceil(i/2) : null;
  const tagTxt  = seg.type==='run' ? 'RUN' : 'ZONE '+zoneNum;
  const tagCls  = seg.type==='run' ? 'tag-run' : 'tag-zone';
  const slCls   = seg.type==='run' ? 'run-slider' : 'zone-slider';
  const maxVal  = seg.type==='run' ? 180 : 240;
  const stepVal = seg.type==='run' ? 1 : 5;

  const row = document.createElement('div');
  row.className = 'seg-row';
  row.innerHTML = `
    <div class="seg-top">
      <div class="seg-left">
        <span class="tag ${tagCls}">${tagTxt}</span>
        <span class="seg-name">${seg.label}</span>
      </div>
      <div class="seg-time" id="tv-${i}">${fmtSec(seg.def)}</div>
    </div>
    <div class="seg-sub">${seg.sub}</div>
    <input type="range" class="${slCls}" min="15" max="${maxVal}" step="${stepVal}"
           value="${seg.def}" id="sl-${i}" oninput="update(${i})">
  `;
  list.appendChild(row);
});

// Chart
const labels = segments.map(s=>s.label);
const colors  = segments.map(s=>s.type==='run'?'#378ADD':'#639922');
let chartInst = null;

chartInst = new Chart(document.getElementById('splitChart'), {
  type: 'bar',
  data: { labels, datasets: [{ label:'Split (sec)', data:[...times], backgroundColor:colors, borderRadius:3, borderSkipped:false }] },
  options: {
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend:{display:false}, tooltip:{callbacks:{label:ctx=>'  '+fmtSec(ctx.parsed.x)}} },
    scales: {
      x: { ticks:{color:'#6c6c70',font:{size:10},callback:v=>fmtSec(v)}, grid:{color:'rgba(0,0,0,0.05)'} },
      y: { ticks:{color:'#6c6c70',font:{size:10}}, grid:{display:false} }
    }
  }
});

recalc();
</script>
</body>
</html>
